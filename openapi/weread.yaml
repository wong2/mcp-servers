          type: integer
          description: 章节 UID。
        chapterIdx:
          type: integer
          description: 章节序号。
        title:
          type: string
          description: 章节标题。
    ChapterSummaryWithBookId:
      allOf:
        - $ref: '#/components/schemas/ChapterSummary'
        - type: object
          properties:
            bookId:
              type: string
              description: 书籍 ID。

    ReadingProgress:
      type: object
      description: 当前书籍阅读进度。
      properties:
        chapterUid:
          type: integer
          description: 当前阅读章节 UID。
        chapterOffset:
          type: integer
          description: 当前章节内偏移。
        progress:
          type: integer
          minimum: 0
          maximum: 100
          description: |
            阅读进度百分比整数，范围 0-100。`1` 表示 1%，不是 100%；
            只有 `100` 才代表已读完。
        updateTime:
          type: integer
          format: int64
          description: 最后阅读时间，Unix 时间戳。
        recordReadingTime:
          type: integer
          description: 累计阅读时长，单位秒。
        finishTime:
          type: integer
          format: int64
          description: 读完时间，仅 `progress=100` 时存在。
        isStartReading:
          oneOf:
            - type: boolean
            - type: integer
              enum:
                - 0
                - 1
          description: 是否已开始阅读。

    ShelfBook:
      type: object
      description: 书架中的电子书、导入书或公众号类书籍条目。
      properties:
        bookId:
          type: string
          description: 书籍唯一标识。
        title:
          type: string
          description: 书名。
        author:
          type: string
          description: 作者。
        cover:
          type: string
          format: uri
          description: 封面图 URL。
        category:
          type: string
          description: 分类。
        readUpdateTime:
          type: integer
          format: int64
          description: 最近阅读时间，Unix 时间戳。
        finishReading:
          type: integer
          enum:
            - 0
            - 1
          description: 是否读完，`1` 表示读完。
        updateTime:
          type: integer
          format: int64
          description: 书籍更新时间，Unix 时间戳。
        isTop:
          type: integer
          enum:
            - 0
            - 1
          description: 是否置顶，`1` 表示置顶。
        secret:
          type: integer
          enum:
            - 0
            - 1
          description: 是否私密阅读，`1` 表示私密。
      additionalProperties: true
    ShelfAlbum:
      type: object
      description: 书架中的专辑/有声书条目。
      properties:
        albumInfo:
          $ref: '#/components/schemas/AlbumInfo'
        albumInfoExtra:
          $ref: '#/components/schemas/AlbumInfoExtra'
    AlbumInfo:
      type: object
      description: 专辑/有声书基础信息。
      properties:
        albumId:
          type: string
          description: 专辑唯一标识。
        name:
          type: string
          description: 专辑名称。
        authorName:
          type: string
          description: 演播/作者名称。
        cover:
          type: string
          format: uri
          description: 封面图 URL。
        trackCount:
          type: integer
          description: 音频集数。
        finishStatus:
          type: string
          description: 完结状态文案，如 `已完结`。
        finish:
          type: integer
          enum:
            - 0
            - 1
          description: 是否完结，`1` 表示完结。
        payType:
          type: integer
          description: 付费类型。
        intro:
          type: string
          description: 专辑简介。
        updateTime:
          type: integer
          format: int64
          description: 更新时间，Unix 时间戳。
      additionalProperties: true
    AlbumInfoExtra:
      type: object
      description: 专辑/有声书在用户书架中的扩展状态。
      properties:
        secret:
          type: integer
          enum:
            - 0
            - 1
          description: 是否私密，`1` 表示私密。
        lecturePaid:
          type: integer
          enum:
            - 0
            - 1
          description: 是否已购买，`1` 表示已购买。
        lectureReadUpdateTime:
          type: integer
          format: int64
          description: 最近收听时间，Unix 时间戳。
        isTop:
          type: integer
          enum:
            - 0
            - 1
          description: 是否置顶，`1` 表示置顶。
      additionalProperties: true
    ShelfArchive:
      type: object
      description: 书架书单/归档。
      properties:
        name:
          type: string
          description: 书单名称。
        bookIds:
          type: array
          description: 书单内的 bookId 列表。
          items:
            type: string

    NotebookBook:
      type: object
      description: 有笔记的书籍概览项。
      properties:
        bookId:
          type: string
          description: 书籍 ID。
        book:
          $ref: '#/components/schemas/BookSummary'
        reviewCount:
          type: integer
          description: 想法/点评数，包含划线想法、书评想法、书摘、非书籍想法等个人内容。
        noteCount:
          type: integer
          description: 划线数；不是单本书总笔记数。
        bookmarkCount:
          type: integer
          description: 书签数；只作为数量统计，当前不能导出书签内容。
        readingProgress:
          type: integer
          minimum: 0
          maximum: 100
          description: 阅读进度百分比。
        markedStatus:
          type: integer
          enum:
            - 0
            - 1
          description: 标记状态，`1`=读完，`0`=在读。
        sort:
          type: integer
          format: int64
          description: 排序值，通常表示最近笔记时间；用于 `lastSort` 翻页。
    Bookmark:
      type: object
      description: 单条划线内容。
      properties:
        bookmarkId:
          type: string
          description: 划线唯一 ID。
        bookId:
          type: string
          description: 书籍 ID。
        chapterUid:
          type: integer
          description: 所在章节 UID。
        markText:
          type: string
          description: 划线原文。
        createTime:
          type: integer
          format: int64
          description: 创建时间，Unix 时间戳。
        type:
          type: integer
          description: 类型；本接口已过滤书签，通常只返回划线。
          enum:
            - 1
        range:
          type: string
          description: 位置范围，格式为 `起始-结束`，例如 `900-2004`。
          pattern: '^[0-9]+-[0-9]+$'
        colorStyle:
          oneOf:
            - type: integer
            - type: string
          description: 划线颜色样式。

    MineReviewItem:
      type: object
      description: 个人想法/点评列表项。
      properties:
        review:
          $ref: '#/components/schemas/MineReview'
    MineReview:
      type: object
      description: 当前用户在书籍中的个人内容，可为划线想法、章节点评或整本书评。
      properties:
        reviewId:
          type: string
          description: 唯一 ID。
        content:
          type: string
          description: 内容文本。
        createTime:
          type: integer
          format: int64
          description: 创建时间，Unix 时间戳。
        star:
          type: integer
          minimum: -1
          maximum: 5
          description: 评分，0-5；`-1` 表示无评分。
        chapterName:
          type: string
          description: 所在章节名；章节点评时有值，整本书评可能为空。
        isFinish:
          oneOf:
            - type: boolean
            - type: integer
              enum:
                - 0
                - 1
          description: 是否读完，书评时可能有值。
        bookId:
          type: string
          description: 书籍 ID；服务端返回时可用于定位。
        chapterUid:
          type: integer
          description: 章节 UID；存在时可用于构造划线/想法位置链接。
        range:
          type: string
          description: 关联划线的位置范围，格式为 `起始-结束`；存在时可用于定位。
        abstract:
          type: string
          description: 关联划线原文摘要；划线想法可能返回。
        author:
          $ref: '#/components/schemas/User'
      additionalProperties: true
    UnderlineStat:
      type: object
      description: 章节内某个划线范围的热度统计。
      properties:
        range:
          type: string
          description: 划线位置范围，如 `393-401`。
          pattern: '^[0-9]+-[0-9]+$'
        count:
          type: integer
          description: 划线人数。
        score:
          type: number
          format: float
          description: 热度分数。
        type:
          type: integer
          description: 划线类型。
    BestBookmark:
      type: object
      description: 热门划线项。
      properties:
        bookId:
          type: string
          description: 书籍 ID。
        userVid:
          type: integer
          format: int64
          description: 代表用户 VID。
        bookmarkId:
          type: string
          description: 划线唯一 ID。
        chapterUid:
          type: integer
          description: 所在章节 UID。
        range:
          type: string
          description: 划线位置范围，如 `393-401`。
          pattern: '^[0-9]+-[0-9]+$'
        markText:
          type: string
          description: 划线原文文本。
        totalCount:
          type: integer
          description: 划线人数。
        simplifiedRange:
          type: string
          description: 简体书籍的 range，繁简体书专属。
        traditionalRange:
          type: string
          description: 繁体书籍的 range，繁简体书专属。
    ReadReviewsRangeQuery:
      type: object
      description: 要查询想法/评论的划线范围。
      required:
        - range
      additionalProperties: false
      properties:
        range:
          type: string
          description: 划线位置范围，从 `/book/bestbookmarks` 获取。
          pattern: '^[0-9]+-[0-9]+$'
          example: 900-2004
        maxIdx:
          type: integer
          minimum: 0
          description: 翻页偏移，默认 0。
          default: 0
        count:
          type: integer
          minimum: 1
          maximum: 20
          description: 每页数量，服务端上限 20，超过会自动截断。
          default: 20
        synckey:
          type: integer
          description: 翻页游标，默认 0。
          default: 0
    RangeReviews:
      type: object
      description: 某个划线范围下的想法列表。
      properties:
        range:
          type: string
          description: 划线范围。
          pattern: '^[0-9]+-[0-9]+$'
        totalCount:
          type: integer
          description: 该范围下想法总数。
        hasMore:
          type: integer
          enum:
            - 0
            - 1
          description: 是否还有更多，`1` 表示有。
        maxIdx:
          type: integer
          description: 翻页偏移。
        synckey:
          type: integer
          description: 翻页游标。
        pageReviews:
          type: array
          description: 想法数组。
          items:
            $ref: '#/components/schemas/PageReview'
    PageReview:
      type: object
      description: 划线下的一条想法。
      properties:
        reviewId:
          type: string
          description: 想法 ID。
        review:
          $ref: '#/components/schemas/ReadReviewDetail'
    ReadReviewDetail:
      type: object
      description: 划线下想法详情对象。
      properties:
        abstract:
          type: string
          description: 划线原文，想法对应的划线内容。
        content:
          type: string
          description: 想法内容。
        range:
          type: string
          description: 划线位置范围。
          pattern: '^[0-9]+-[0-9]+$'
        createTime:
          type: integer
          format: int64
          description: 创建时间，Unix 时间戳。
        author:
          $ref: '#/components/schemas/User'
      additionalProperties: true

    SingleReview:
      type: object
      description: 单条想法详情对象。
      properties:
        reviewId:
          type: string
          description: 想法 ID。
        content:
          type: string
          description: 内容文本。
        bookId:
          type: string
          description: 书籍 ID。
        chapterUid:
          type: integer
          description: 章节 UID。
        range:
          type: string
          description: 关联划线位置范围，存在时可用于定位。
        createTime:
          type: integer
          format: int64
          description: 创建时间，Unix 时间戳。
        author:
          $ref: '#/components/schemas/User'
      additionalProperties: true
    PublicReviewListItem:
      type: object
      description: 公开点评列表项。
      properties:
        idx:
          type: integer
          description: 序号，用于翻页时作为下一页 `maxIdx`。
        review:
          $ref: '#/components/schemas/PublicReviewEnvelope'
    PublicReviewEnvelope:
      type: object
      description: 公开点评包装对象。
      properties:
        reviewId:
          type: string
          description: 点评唯一 ID。
        review:
          $ref: '#/components/schemas/PublicReview'
    PublicReview:
      type: object
      description: 书籍公开点评详情。
      properties:
        content:
          type: string
          description: 点评文本内容。
        htmlContent:
          type: string
          description: 点评 HTML 富文本内容。
        star:
          type: integer
          enum:
            - 20
            - 40
            - 60
            - 80
            - 100
          description: 评分，`20`=一星，`40`=二星，`60`=三星，`80`=四星，`100`=五星。
        isFinish:
          oneOf:
            - type: boolean
            - type: integer
              enum:
                - 0
                - 1
          description: 是否读完此书。
        createTime:
          type: integer
          format: int64
          description: 创建时间，Unix 时间戳。
        chapterName:
          type: string
          description: 所在章节名；章节点评时有值。
        author:
          $ref: '#/components/schemas/User'
        book:
          $ref: '#/components/schemas/BookSummary'
      additionalProperties: true
    User:
      type: object
      description: 用户信息。
      properties:
        userVid:
          type: integer
          format: int64
          description: 用户 VID。
