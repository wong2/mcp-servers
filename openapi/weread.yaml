          description: 逻辑接口名。
        description:
          type: string
          description: 接口说明。
        params:
          type: array
          description: 参数定义数组。
          items:
            $ref: '#/components/schemas/ApiParameterDefinition'
      additionalProperties: true
    ApiParameterDefinition:
      type: object
      description: 接口参数定义。
      properties:
        name:
          type: string
          description: 参数名。
        type:
          type: string
          description: 参数类型。
        required:
          type: boolean
          description: 是否必填。
        description:
          type: string
          description: 参数说明。
      additionalProperties: true
