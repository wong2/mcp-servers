        counts:
          type: string
          description: 统计值文案，如 `12本`、`45天`、`120条`。
        scheme:
          type: string
          description: 对应统计项的 App 跳转链接，可能为空。
    PreferCategory:
      type: object
      description: 偏好阅读分类。
      properties:
        categoryId:
          type: integer
          description: 分类 ID。
        categoryTitle:
          type: string
          description: 分类名称。
        parentCategoryId:
          type: integer
          description: 父分类 ID。
        parentCategoryTitle:
          type: string
          description: 父分类名称。
        val:
          type: number
          format: float
          description: 分类偏好权重，按最高分类阅读时长归一化后的相对值。
        readingTime:
          type: integer
          description: 该分类阅读时长，单位秒。
        readingCount:
          type: integer
          description: 该分类阅读本数。
        categoryType:
          type: integer
          description: 分类类型标记，普通分类为 0，部分特殊分类可能返回 1 或 2。
    PreferAuthor:
      type: object
      description: 偏好作者。
