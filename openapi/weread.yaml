          default: 10
        commentsDirection:
          type: integer
          enum:
            - 0
            - 1
          description: 评论排序方向，`0`=倒序，`1`=正序。
        likesCount:
          type: integer
          minimum: 0
          description: 拉取点赞数量，默认 10。
          default: 10
        likesDirection:
          type: integer
          enum:
            - 0
          description: 点赞排序方向，`0`=倒序。
        synckey:
          type: integer
          description: 增量同步 key，默认 0。
          default: 0
        skill_version:
          type: string
          enum:
            - 1.0.3
          description: 技能文档版本，固定为当前版本 `1.0.3`。
    ReviewSingleResponse:
