openapi: 3.0.3
info:
  title: 微信读书 Agent Gateway API
  version: 1.0.3
  description: |
    微信读书助手通过统一网关 `POST /api/agent/gateway` 调用接口。

    所有业务参数必须平铺在 JSON body 顶层，与 `api_name`、`skill_version`
    同级，不要包在 `params`、`data`、`body` 等对象里。每次请求必须携带
    `skill_version`，当前技能文档版本为 `1.0.3`。

    逻辑接口由 `api_name` 区分。本文档用一个真实网关 Operation 配合
    `oneOf`/`discriminator` 完整描述所有接口请求体；响应体也按各
    `api_name` 建模。若响应出现 `upgrade_info`，调用方应暂停当前操作并按
    `upgrade_info.message` 指引升级后重试。
servers:
  - url: https://i.weread.qq.com
    description: 微信读书接口域名
security:
  - bearerAuth: []
tags:
  - name: Gateway
    description: Agent API Gateway 统一入口
  - name: Search
    description: 搜索书籍、作者、文章、公众号、全文、书单等内容
  - name: Book
    description: 书籍详情、章节目录和阅读进度
  - name: Shelf
    description: 书架、电子书、专辑/有声书与文章收藏入口
  - name: Notes
    description: 个人笔记本、划线、想法、热门划线和划线下评论
  - name: Review
    description: 书籍公开点评与单条想法详情
  - name: ReadData
    description: 阅读统计、阅读时长、偏好分析和年度数据
  - name: Discover
    description: 个性化推荐与相似书推荐
paths:
  /api/agent/gateway:
    post:
      tags:
        - Gateway
      operationId: callWeReadAgentGateway
      summary: 调用微信读书 Agent Gateway
      description: |
        统一调用入口。请求体中的 `api_name` 指定要调用的逻辑接口，其余字段是
        该接口的业务参数，且必须全部平铺在 body 顶层。

        已建模的 `api_name` 包括：
        `/store/search`、`/book/info`、`/book/chapterinfo`、`/book/getprogress`、
        `/shelf/sync`、`/user/notebooks`、`/book/bookmarklist`、
        `/review/list/mine`、`/book/underlines`、`/book/bestbookmarks`、
        `/book/readreviews`、`/review/single`、`/review/list`、
        `/readdata/detail`、`/book/recommend`、`/book/similar`、`/_list`。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/StoreSearchRequest'
                - $ref: '#/components/schemas/BookInfoRequest'
                - $ref: '#/components/schemas/BookChapterInfoRequest'
                - $ref: '#/components/schemas/BookGetProgressRequest'
                - $ref: '#/components/schemas/ShelfSyncRequest'
                - $ref: '#/components/schemas/UserNotebooksRequest'
                - $ref: '#/components/schemas/BookBookmarkListRequest'
                - $ref: '#/components/schemas/ReviewListMineRequest'
                - $ref: '#/components/schemas/BookUnderlinesRequest'
                - $ref: '#/components/schemas/BookBestBookmarksRequest'
                - $ref: '#/components/schemas/BookReadReviewsRequest'
                - $ref: '#/components/schemas/ReviewSingleRequest'
                - $ref: '#/components/schemas/ReviewListRequest'
                - $ref: '#/components/schemas/ReadDataDetailRequest'
                - $ref: '#/components/schemas/BookRecommendRequest'
                - $ref: '#/components/schemas/BookSimilarRequest'
                - $ref: '#/components/schemas/ListApisRequest'
              discriminator:
                propertyName: api_name
                mapping:
                  /store/search: '#/components/schemas/StoreSearchRequest'
                  /book/info: '#/components/schemas/BookInfoRequest'
                  /book/chapterinfo: '#/components/schemas/BookChapterInfoRequest'
                  /book/getprogress: '#/components/schemas/BookGetProgressRequest'
                  /shelf/sync: '#/components/schemas/ShelfSyncRequest'
                  /user/notebooks: '#/components/schemas/UserNotebooksRequest'
                  /book/bookmarklist: '#/components/schemas/BookBookmarkListRequest'
                  /review/list/mine: '#/components/schemas/ReviewListMineRequest'
                  /book/underlines: '#/components/schemas/BookUnderlinesRequest'
                  /book/bestbookmarks: '#/components/schemas/BookBestBookmarksRequest'
                  /book/readreviews: '#/components/schemas/BookReadReviewsRequest'
                  /review/single: '#/components/schemas/ReviewSingleRequest'
                  /review/list: '#/components/schemas/ReviewListRequest'
                  /readdata/detail: '#/components/schemas/ReadDataDetailRequest'
                  /book/recommend: '#/components/schemas/BookRecommendRequest'
                  /book/similar: '#/components/schemas/BookSimilarRequest'
                  /_list: '#/components/schemas/ListApisRequest'
            examples:
              searchBook:
                summary: 搜索电子书
                value:
                  api_name: /store/search
                  keyword: 三体
                  scope: 10
                  count: 10
                  skill_version: 1.0.3
              notebooksNextPage:
                summary: 笔记本下一页
                value:
                  api_name: /user/notebooks
                  count: 20
                  lastSort: 1778312777
                  skill_version: 1.0.3
              readReviews:
                summary: 查询划线下的想法
                value:
                  api_name: /book/readreviews
                  bookId: "3300045871"
                  chapterUid: 107
                  reviews:
                    - range: 900-2004
                      count: 20
                      maxIdx: 0
                      synckey: 0
                  skill_version: 1.0.3
      responses:
        '200':
          description: |
            网关返回 JSON。`errcode` 非 0 时表示错误；成功响应的字段因
            `api_name` 不同而不同。
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/StoreSearchResponse'
                  - $ref: '#/components/schemas/BookInfoResponse'
                  - $ref: '#/components/schemas/BookChapterInfoResponse'
                  - $ref: '#/components/schemas/BookGetProgressResponse'
                  - $ref: '#/components/schemas/ShelfSyncResponse'
                  - $ref: '#/components/schemas/UserNotebooksResponse'
                  - $ref: '#/components/schemas/BookBookmarkListResponse'
                  - $ref: '#/components/schemas/ReviewListMineResponse'
                  - $ref: '#/components/schemas/BookUnderlinesResponse'
                  - $ref: '#/components/schemas/BookBestBookmarksResponse'
                  - $ref: '#/components/schemas/BookReadReviewsResponse'
                  - $ref: '#/components/schemas/ReviewSingleResponse'
                  - $ref: '#/components/schemas/ReviewListResponse'
                  - $ref: '#/components/schemas/ReadDataDetailResponse'
                  - $ref: '#/components/schemas/BookRecommendResponse'
                  - $ref: '#/components/schemas/BookSimilarResponse'
                  - $ref: '#/components/schemas/ListApisResponse'
                  - $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 未提供或未通过鉴权的 API Key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: 请求过于频繁
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 服务端错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: |
        使用 `Authorization: Bearer $WEREAD_API_KEY` 鉴权。API Key 形如
        `wrk-xxxxxxxx`，并自动绑定用户身份（vid）。
  schemas:
    GatewayResponseMeta:
      type: object
      description: 所有网关响应都可能包含的通用字段。
      properties:
        errcode:
          type: integer
          description: 错误码；非 0 表示调用失败。成功响应中可能不存在或为 0。
          example: 0
        errmsg:
          type: string
          description: 错误信息或提示文案。
        upgrade_info:
          $ref: '#/components/schemas/UpgradeInfo'
    UpgradeInfo:
      type: object
      description: |
        技能升级提示。响应中出现该字段时，应立即暂停当前操作，按 message 指引
        完成升级后再重新执行请求。
      properties:
        message:
          type: string
          description: 面向调用方的升级说明。
        version:
          type: string
          description: 建议升级到的技能版本。
        url:
          type: string
          format: uri
          description: 升级说明或下载地址。
      additionalProperties: true
    ErrorResponse:
      allOf:
        - $ref: '#/components/schemas/GatewayResponseMeta'
        - type: object
          required:
            - errcode
          properties:
            errcode:
              type: integer
              description: 非 0 错误码。
              example: 401
            errmsg:
              type: string
              description: 中文错误提示或服务端返回的错误信息。
              example: API Key 无效或已过期

    StoreSearchRequest:
      type: object
      description: "`/store/search` 搜索请求。根据 `scope` 切换搜索 tab。"
      required:
        - api_name
        - keyword
        - skill_version
      additionalProperties: false
      properties:
        api_name:
          type: string
          enum:
            - /store/search
          description: 逻辑接口名，固定为 `/store/search`。
        keyword:
          type: string
          description: 搜索关键词。
          example: 三体
        scope:
          type: integer
          description: |
            搜索类型。未传时服务端默认 `10`（电子书）。
            `0`=全部，`10`=电子书，`16`=网文小说，`14`=微信听书/有声书/专辑，
            `6`=作者，`12`=全文，`13`=书单，`2`=公众号，`4`=文章。
          enum:
            - 0
            - 2
            - 4
            - 6
            - 10
            - 12
            - 13
            - 14
            - 16
          default: 10
        maxIdx:
          type: integer
          minimum: 0
          description: 翻页偏移；下一页使用上一页最后一条结果的 `searchIdx`。
          default: 0
        count:
          type: integer
          minimum: 1
          description: 每页数量；不传则服务端默认 15。用户未指定数量时建议不传。
          default: 15
        skill_version:
          type: string
          enum:
            - 1.0.3
          description: 技能文档版本，固定为当前版本 `1.0.3`。
    StoreSearchResponse:
      allOf:
        - $ref: '#/components/schemas/GatewayResponseMeta'
        - type: object
          description: "`/store/search` V3 格式搜索响应。"
          properties:
            sid:
              type: string
              description: 搜索会话 ID。
            hasMore:
              type: integer
              enum:
                - 0
                - 1
              description: 是否还有更多结果，`1` 表示有，`0` 表示无。
            results:
              type: array
              description: 搜索结果分组数组；`scope=0` 时会返回多个分组。
              items:
                $ref: '#/components/schemas/SearchResultGroup'

    BookInfoRequest:
      type: object
      description: "`/book/info` 获取书籍基本信息。"
      required:
        - api_name
        - bookId
        - skill_version
      additionalProperties: false
      properties:
        api_name:
          type: string
          enum:
            - /book/info
          description: 逻辑接口名，固定为 `/book/info`。
        bookId:
          type: string
          description: 书籍 ID。用户输入书名时应先通过 `/store/search` 获取。
          example: "3300045871"
        skill_version:
          type: string
          enum:
            - 1.0.3
          description: 技能文档版本，固定为当前版本 `1.0.3`。
    BookInfoResponse:
      allOf:
        - $ref: '#/components/schemas/GatewayResponseMeta'
        - $ref: '#/components/schemas/BookDetail'

    BookChapterInfoRequest:
      type: object
      description: "`/book/chapterinfo` 获取章节目录。"
      required:
        - api_name
        - bookId
        - skill_version
      additionalProperties: false
      properties:
        api_name:
          type: string
          enum:
            - /book/chapterinfo
          description: 逻辑接口名，固定为 `/book/chapterinfo`。
        bookId:
          type: string
          description: 书籍 ID。
          example: "3300045871"
        skill_version:
          type: string
          enum:
            - 1.0.3
          description: 技能文档版本，固定为当前版本 `1.0.3`。
    BookChapterInfoResponse:
      allOf:
        - $ref: '#/components/schemas/GatewayResponseMeta'
        - type: object
          description: "`/book/chapterinfo` 章节目录响应。"
          properties:
            bookId:
              type: string
              description: 书籍 ID。
            synckey:
              type: integer
              description: 同步 key 或目录版本号。
            chapterUpdateTime:
              type: integer
              format: int64
              description: 章节最后更新时间，Unix 时间戳。
            chapters:
              type: array
              description: 章节数组，按目录顺序返回。
              items:
                $ref: '#/components/schemas/Chapter'

    BookGetProgressRequest:
      type: object
      description: "`/book/getprogress` 获取某本书的阅读进度。"
      required:
        - api_name
        - bookId
        - skill_version
      additionalProperties: false
      properties:
        api_name:
          type: string
          enum:
            - /book/getprogress
          description: 逻辑接口名，固定为 `/book/getprogress`。
        bookId:
          type: string
          description: 书籍 ID。
          example: "3300045871"
        skill_version:
          type: string
          enum:
            - 1.0.3
          description: 技能文档版本，固定为当前版本 `1.0.3`。
    BookGetProgressResponse:
      allOf:
        - $ref: '#/components/schemas/GatewayResponseMeta'
        - type: object
          description: "`/book/getprogress` 阅读进度响应。"
          properties:
            bookId:
              type: string
              description: 书籍 ID。
            book:
              $ref: '#/components/schemas/ReadingProgress'
            timestamp:
              type: integer
              format: int64
              description: 服务端时间戳。

    ShelfSyncRequest:
      type: object
      description: "`/shelf/sync` 获取当前用户书架。用户身份由 API Key 自动识别。"
      required:
        - api_name
        - skill_version
      additionalProperties: false
      properties:
        api_name:
          type: string
          enum:
            - /shelf/sync
          description: 逻辑接口名，固定为 `/shelf/sync`。
        skill_version:
          type: string
          enum:
            - 1.0.3
          description: 技能文档版本，固定为当前版本 `1.0.3`。
    ShelfSyncResponse:
      allOf:
        - $ref: '#/components/schemas/GatewayResponseMeta'
        - type: object
          description: |
            `/shelf/sync` 书架响应。书架可见条目总数应按
            `books.length + albums.length + (mp 非空 ? 1 : 0)` 计算。
            `albums[]` 是专辑/有声书，也属于书架里的书。
          properties:
            books:
              type: array
              description: 可枚举的电子书、导入书、公众号类书籍条目数组，不含专辑和文章收藏入口。
              items:
                $ref: '#/components/schemas/ShelfBook'
            albums:
              type: array
              description: 专辑/有声书数组，与 `books` 完全独立，但计入书架总数。
              items:
                $ref: '#/components/schemas/ShelfAlbum'
            mp:
              type: object
              nullable: true
              description: 文章收藏入口对象；非空时表示书架界面有 1 个文章收藏条目。
              additionalProperties: true
            archive:
              type: array
              description: 书单/归档数组。
              items:
                $ref: '#/components/schemas/ShelfArchive'
            bookCount:
              type: integer
              description: 可枚举电子书数量，通常等于 `books.length`，不含 `albums[]` 和 `mp`。

    UserNotebooksRequest:
      type: object
      description: "`/user/notebooks` 获取所有有笔记的书的概览。"
      required:
        - api_name
        - skill_version
      additionalProperties: false
      properties:
        api_name:
          type: string
          enum:
            - /user/notebooks
          description: 逻辑接口名，固定为 `/user/notebooks`。
        count:
          type: integer
          minimum: 1
          description: 每页数量，默认 20。
          default: 20
        lastSort:
          type: integer
          format: int64
          description: 翻页游标；下一页取上一页 `books` 最后一项的 `sort` 值。
        skill_version:
          type: string
          enum:
            - 1.0.3
          description: 技能文档版本，固定为当前版本 `1.0.3`。
    UserNotebooksResponse:
      allOf:
        - $ref: '#/components/schemas/GatewayResponseMeta'
        - type: object
          description: |
            `/user/notebooks` 笔记本概览响应。单本书总笔记数必须按
            `reviewCount + noteCount + bookmarkCount` 计算；`noteCount` 仅为划线数。
          properties:
            totalBookCount:
              type: integer
              description: 有笔记的书籍总数。
            totalNoteCount:
              type: integer
              description: 所有书的笔记总条数，统计口径为 `reviewCount + noteCount + bookmarkCount` 汇总。
            hasMore:
              type: integer
              enum:
                - 0
                - 1
              description: 是否还有更多数据，`1` 表示有。
            books:
              type: array
              description: 有笔记的书籍数组。
              items:
                $ref: '#/components/schemas/NotebookBook'

    BookBookmarkListRequest:
      type: object
      description: "`/book/bookmarklist` 获取单本书划线内容列表。自动过滤书签，只返回划线。"
      required:
        - api_name
        - bookId
        - skill_version
      additionalProperties: false
      properties:
        api_name:
          type: string
          enum:
            - /book/bookmarklist
          description: 逻辑接口名，固定为 `/book/bookmarklist`。
        bookId:
          type: string
          description: 书籍 ID。
          example: "3300045871"
        skill_version:
          type: string
          enum:
            - 1.0.3
          description: 技能文档版本，固定为当前版本 `1.0.3`。
    BookBookmarkListResponse:
      allOf:
        - $ref: '#/components/schemas/GatewayResponseMeta'
        - type: object
          description: "`/book/bookmarklist` 单本书划线内容响应。"
          properties:
            updated:
              type: array
              description: 划线数组；该接口已过滤 type=0 的书签。
              items:
                $ref: '#/components/schemas/Bookmark'
            chapters:
              type: array
              description: 章节信息数组，用于定位划线所属章节。
              items:
                $ref: '#/components/schemas/ChapterSummary'
            book:
              $ref: '#/components/schemas/BookSummary'

    ReviewListMineRequest:
      type: object
      description: "`/review/list/mine` 获取当前用户在单本书上的个人想法与点评。"
      required:
        - api_name
        - bookid
        - skill_version
      additionalProperties: false
      properties:
        api_name:
          type: string
          enum:
            - /review/list/mine
          description: 逻辑接口名，固定为 `/review/list/mine`。
        bookid:
          type: string
          description: 书籍 ID。注意该接口参数名为小写 `bookid`。
          example: "3300045871"
        synckey:
          type: integer
          description: 翻页游标，默认 0。
          default: 0
        count:
          type: integer
          minimum: 1
          description: 每页数量，默认 20。
          default: 20
        skill_version:
          type: string
          enum:
            - 1.0.3
          description: 技能文档版本，固定为当前版本 `1.0.3`。
    ReviewListMineResponse:
      allOf:
        - $ref: '#/components/schemas/GatewayResponseMeta'
        - type: object
          description: "`/review/list/mine` 个人想法与点评响应。"
          properties:
            reviews:
              type: array
              description: 当前用户在该书上的想法/点评数组。
              items:
                $ref: '#/components/schemas/MineReviewItem'
            totalCount:
              type: integer
              description: 总条数。
            hasMore:
              type: integer
              enum:
                - 0
                - 1
              description: 是否还有更多，`1` 表示有。
            synckey:
              type: integer
              description: 翻页游标，下次请求传入。

    BookUnderlinesRequest:
      type: object
      description: "`/book/underlines` 获取某章节划线热度统计，不含划线文本。"
      required:
        - api_name
        - bookId
        - chapterUid
        - skill_version
      additionalProperties: false
      properties:
        api_name:
          type: string
          enum:
            - /book/underlines
          description: 逻辑接口名，固定为 `/book/underlines`。
        bookId:
          type: string
          description: 书籍 ID。
          example: "3300045871"
        chapterUid:
          type: integer
          description: 章节 UID，从 `/book/chapterinfo` 获取。
          example: 107
        synckey:
          type: integer
          description: 增量同步 key，默认 0。
          default: 0
        skill_version:
          type: string
          enum:
            - 1.0.3
          description: 技能文档版本，固定为当前版本 `1.0.3`。
    BookUnderlinesResponse:
      allOf:
        - $ref: '#/components/schemas/GatewayResponseMeta'
        - type: object
          description: "`/book/underlines` 章节划线热度统计响应。"
          properties:
            bookId:
              type: string
              description: 书籍 ID。
            chapterUid:
              type: integer
              description: 章节 UID。
            underlines:
              type: array
              description: 划线热度统计数组，不含划线文本。
              items:
                $ref: '#/components/schemas/UnderlineStat'
            synckey:
              type: integer
              description: 同步 key。

    BookBestBookmarksRequest:
      type: object
      description: "`/book/bestbookmarks` 获取全书或某章节热门划线，包含划线原文和划线人数。"
      required:
        - api_name
        - bookId
        - skill_version
      additionalProperties: false
      properties:
        api_name:
          type: string
          enum:
            - /book/bestbookmarks
          description: 逻辑接口名，固定为 `/book/bestbookmarks`。
        bookId:
          type: string
          description: 书籍 ID。
          example: "3300045871"
        chapterUid:
          type: integer
