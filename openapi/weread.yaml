          type: string
          description: 用户昵称。
        avatar:
          type: string
          format: uri
          description: 用户头像 URL。
      additionalProperties: true
    DeepVRecommendInfo:
      type: object
      description: 资深会员推荐摘要。
      properties:
        title:
          type: string
          description: 标题，如 `2337 个资深会员点评`。
        subtitle:
          type: string
          description: 副标题，如 `其中 2015 人(86.2%)推荐本书`。

    ReadLongestItem:
      type: object
      description: 阅读/收听时长排行项。
      properties:
        book:
          $ref: '#/components/schemas/BookSummary'
        albumInfo:
          $ref: '#/components/schemas/AlbumInfo'
        readTime:
          type: integer
          description: 该书或有声内容在当前统计范围内的阅读/收听时长，单位秒。
        recordReadingTime:
          type: integer
          description: 该书的朗读/记录类阅读时长，单位秒。
        tags:
          type: array
          description: 标签数组，常见值包括 `笔记最多`、`单日阅读最久`。
