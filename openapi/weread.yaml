    ReviewListRequest:
      type: object
      description: "`/review/list` 获取书籍公开点评。"
      required:
        - api_name
        - bookId
        - skill_version
      additionalProperties: false
      properties:
        api_name:
          type: string
          enum:
            - /review/list
          description: 逻辑接口名，固定为 `/review/list`。
        bookId:
          type: string
          description: 书籍 ID。
          example: "3300045871"
        reviewListType:
          type: integer
          enum:
            - 0
            - 1
            - 2
            - 3
            - 4
          default: 0
          description: 筛选类型，`0`=全部，`1`=推荐，`2`=不行，`3`=最新，`4`=一般。
        count:
          type: integer
          minimum: 1
          description: 每页数量，默认 20。
          default: 20
        maxIdx:
          type: integer
          minimum: 0
          description: 翻页偏移；下一页取上一页最后一条点评的 `idx`。
          default: 0
        synckey:
          type: integer
          description: 翻页游标，默认 0。
          default: 0
        skill_version:
          type: string
          enum:
            - 1.0.3
          description: 技能文档版本，固定为当前版本 `1.0.3`。
    ReviewListResponse:
      allOf:
        - $ref: '#/components/schemas/GatewayResponseMeta'
        - type: object
          description: "`/review/list` 书籍公开点评响应。"
          properties:
            synckey:
              type: integer
              description: 翻页游标，下次请求传入。
            reviewsCnt:
              type: integer
              description: 点评总数。
            recentTotalCnt:
              type: integer
              description: 最新点评数。
            reviewsHasMore:
              type: integer
              enum:
                - 0
                - 1
              description: 是否有更多点评，`1` 表示有。
            reviewsHas5Star:
              type: integer
              enum:
                - 0
                - 1
              description: 是否有五星推荐点评，`1` 表示有。
            reviewsHas1Star:
              type: integer
              enum:
                - 0
                - 1
              description: 是否有一星差评，`1` 表示有。
            reviewsHasRecent:
              type: integer
              enum:
                - 0
                - 1
              description: 是否有最新点评，`1` 表示有。
            friendCommentCount:
              type: integer
              description: 好友点评数。
            friendUniqueCount:
              type: integer
              description: 点评好友数。
            friendCommentUsers:
              type: array
              description: 点评好友信息数组。
              items:
                $ref: '#/components/schemas/User'
            deepVRecommendInfo:
              $ref: '#/components/schemas/DeepVRecommendInfo'
            deepVRecommendValue:
              type: integer
              description: 资深会员推荐比例，`862` 表示 86.2%。
              example: 862
            deepVUniqueCount:
              type: integer
              description: 点评资深会员数。
            reviews:
              type: array
              description: 点评数组。
              items:
                $ref: '#/components/schemas/PublicReviewListItem'

    ReadDataDetailRequest:
      type: object
      description: "`/readdata/detail` 获取阅读统计详情。"
      required:
        - api_name
        - skill_version
      additionalProperties: false
      properties:
        api_name:
          type: string
          enum:
            - /readdata/detail
          description: 逻辑接口名，固定为 `/readdata/detail`。
        mode:
          type: string
          enum:
            - weekly
            - monthly
            - annually
            - overall
          default: monthly
          description: |
            统计维度：`weekly`=本周/自然周，`monthly`=本月/自然月，
            `annually`=本年/自然年，`overall`=总计。
        baseTime:
          type: integer
          format: int64
          description: |
            基准时间戳。`0` 表示当前周期，服务端会归一化到周期起点：
            周一、月初或年初；`overall` 固定为 0。
        skill_version:
          type: string
          enum:
            - 1.0.3
          description: 技能文档版本，固定为当前版本 `1.0.3`。
    ReadDataDetailResponse:
      allOf:
        - $ref: '#/components/schemas/GatewayResponseMeta'
        - type: object
          description: |
            `/readdata/detail` 阅读统计响应。所有阅读时长字段除特别说明外均为秒，
            不得按分钟或小时解释。
          properties:
            baseTime:
              type: integer
              format: int64
              description: 统计周期基准时间戳；周/月/年模式分别归一到周期起点，`overall` 为 0。
            readTimes:
              type: object
              description: |
                分桶阅读/收听总时长，key 为分桶起始时间戳，value 为秒数。
                周/月通常按天，年按月，总计按年。
              additionalProperties:
                type: integer
                description: 该分桶阅读/收听时长，单位秒。
            dailyReadTimes:
              type: object
              description: 年度模式可能返回的每日阅读时长明细；用于日历明细，不应替代总量口径。
              additionalProperties:
                type: integer
                description: 单日阅读/收听时长，单位秒。
            readDays:
              type: integer
              description: 有效阅读天数；当前规则为单日阅读满 1 分钟。
            totalReadTime:
              type: integer
              description: 当前请求周期总阅读/收听时长，单位秒；统计总时长时优先使用此字段。
            dayAverageReadTime:
              type: integer
              description: 日均阅读/收听时长，单位秒；分母为自然日数，不是 `readDays`。
            compare:
              type: number
              format: float
              description: 与上一周期日均时长对比比例，`0.2` 表示约增长 20%。
            readLongest:
              type: array
              description: 读得最多的书/有声内容排行，最多 10 条，低于 5 分钟的条目会被过滤。
              items:
                $ref: '#/components/schemas/ReadLongestItem'
            readStat:
              type: array
              description: 阅读统计摘要数组，如读过、读完、阅读、笔记等。
              items:
                $ref: '#/components/schemas/ReadStat'
            preferCategory:
              type: array
              description: 偏好阅读分类数组，最多 8 个。
              items:
                $ref: '#/components/schemas/PreferCategory'
            preferCategoryWord:
              type: string
              description: 偏好分类文案，如 `偏好阅读文学`。
            preferTime:
              type: array
              description: 24 小时阅读时段分布，值为秒数；输出顺序从 6 点到次日 5 点。
              minItems: 24
              maxItems: 24
              items:
                type: integer
                description: 对应小时段的阅读/收听时长，单位秒。
            preferTimeWord:
              type: string
              description: 偏好时段文案；总偏好时段数据不足 10 小时时可能不返回。
            preferAuthor:
              type: array
              description: 偏好作者数组；只有作者数据达到展示阈值时返回。
              items:
                $ref: '#/components/schemas/PreferAuthor'
            authorCount:
              type: integer
              description: 符合统计条件的作者总数，不一定等于 `preferAuthor` 返回条数。
            preferPublisher:
              type: array
              description: 偏好出版社数组。
              items:
                $ref: '#/components/schemas/PreferPublisher'
            preferCp:
              type: array
              description: 偏好版权方数组。
              items:
                $ref: '#/components/schemas/PreferCopyrightParty'
            readRate:
              type: number
              format: float
              description: 文字阅读占比百分比，约为 `wrReadTime / (wrReadTime + wrListenTime) * 100`。
            wrReadTime:
              type: integer
              description: 文字阅读时长，单位秒；通常为 `totalReadTime - wrListenTime`。
            wrListenTime:
              type: integer
              description: 听书/TTS/有声内容时长，单位秒。
            rank:
              $ref: '#/components/schemas/ReadRank'
            registTime:
              type: integer
              format: int64
              description: 用户注册时间戳。
            medals:
              type: array
              description: 勋章数组；可展示勋章不少于 3 个时返回。
              items:
                $ref: '#/components/schemas/Medal'
            preferBooks:
              type: array
              description: 偏好阅读书籍卡片数组。
              items:
                $ref: '#/components/schemas/PreferBook'
            yearReport:
              type: array
              description: 年度报告入口数组；`times` 为该年 12 个月阅读/收听时长。
              items:
                $ref: '#/components/schemas/YearReport'
            recordReadingTime:
              type: integer
              description: 总朗读/记录类阅读时长，单位秒，主要在 `overall` 模式汇总返回。
            readRecordsWord:
              type: string
              description: 书籍分布模块标题文案，当前常见为 `书籍分布`。
            readDistributionWord:
              type: string
              description: 点评分布模块标题文案，当前常见为 `点评分布`。
            readTimeGears:
              type: array
              description: 阅读时长档位数组，用于前端展示分段。
              example:
                - 60
                - 1800
                - 3600
                - 10800
                - 18000
              items:
                type: integer
                description: 档位阈值，单位秒。
            styleType:
              type: string
              description: 样式类型，常见为 `normal`；年度报告场景可能返回特殊样式。

