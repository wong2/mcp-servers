        title:
          type: string
          description: 勋章标题。
        name:
          type: string
          description: 勋章名称。
        icon:
          type: string
          format: uri
          description: 勋章图标 URL。
      additionalProperties: true
    PreferBook:
      type: object
      description: 偏好阅读书籍卡片。
      properties:
        book:
          $ref: '#/components/schemas/BookSummary'
        reason:
          type: string
          description: 推荐理由或偏好说明。
        type:
          type: string
          description: 偏好类型。
      additionalProperties: true
    YearReport:
